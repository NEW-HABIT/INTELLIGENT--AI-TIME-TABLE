version: "3.9"

services:
  # ─────────────────────────────────────────
  # Redis (Cache + Celery Broker)
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: tnu_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Django Backend
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: tnu_backend
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             python manage.py create_initial_data &&
             uvicorn config.asgi:application --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./backend:/app
      - static_files:/app/staticfiles
      - media_files:/app/media
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.development
    depends_on:
      # db:
      #   condition: service_healthy
      redis:
        condition: service_healthy

  # ─────────────────────────────────────────
  # Celery Worker (Scheduling Engine)
  # ─────────────────────────────────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: tnu_celery_worker
    restart: unless-stopped
    command: celery -A config.celery worker -l info -c 2 -Q scheduling,default
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.development
    depends_on:
      # db:
      #   condition: service_healthy
      redis:
        condition: service_healthy

  # ─────────────────────────────────────────
  # Celery Beat (Periodic Tasks Scheduler)
  # ─────────────────────────────────────────
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: tnu_celery_beat
    restart: unless-stopped
    command: celery -A config.celery beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.development
    depends_on:
      # db:
      #   condition: service_healthy
      redis:
        condition: service_healthy

  # ─────────────────────────────────────────
  # Celery Flower (Task Monitor)
  # ─────────────────────────────────────────
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: tnu_flower
    restart: unless-stopped
    command: celery -A config.celery flower --port=5555 --basic_auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-admin}
    ports:
      - "5555:5555"
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.development
    depends_on:
      - redis
      - celery_worker

  # ─────────────────────────────────────────
  # Next.js Frontend
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: tnu_frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
    depends_on:
      - backend

  # ─────────────────────────────────────────
  # Nginx Reverse Proxy
  # ─────────────────────────────────────────
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: tnu_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - static_files:/app/staticfiles:ro
      - media_files:/app/media:ro
    depends_on:
      - backend
      - frontend

volumes:
#  postgres_data:
  redis_data:
  static_files:
  media_files:

networks:
  default:
    name: tnu_network
